<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>המירוץ למיליון יום הולדת לעמית 🏆</title>
  <style>
    /* ═══════════════════════════════════════
       BASE
    ═══════════════════════════════════════ */
    :root {
      --bg:     #0d0520;
      --gold:   #FFD700;
      --gold2:  #FF9500;
      --pink:   #ff6b9d;
      --cyan:   #00d4ff;
      --purp:   #b24bff;
      --lime:   #00e676;
      --txt:    #f1f5f9;
      --dim:    #94a3b8;
      --green:  #00e676;
      --red:    #ff4757;
      --rad:    22px;
      --team:   #FF6B35;
      --team-s: rgba(255,107,53,.3);
    }

    @keyframes rainbowShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes bgDrift {
      0%   { transform: scale(1)    rotate(0deg);   opacity: .75; }
      50%  { transform: scale(1.12) rotate(4deg);   opacity: 1;   }
      100% { transform: scale(1)    rotate(-2deg);  opacity: .8;  }
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    @keyframes bgGradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #3a006f, #1a0099, #0047c2, #7200a8, #c40062, #3a006f);
      background-size: 400% 400%;
      animation: bgGradientShift 18s ease infinite;
      color: var(--txt);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* shimmer overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 25%, rgba(255,255,255,.07) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 80% 75%, rgba(255,255,255,.06) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 55% 50%, rgba(255,220,255,.05) 0%, transparent 50%);
      animation: bgDrift 14s ease-in-out infinite alternate;
    }

    .screen {
      display: none; position: relative; z-index: 1;
      min-height: 100dvh; padding: 0;
    }
    .screen.active { display: flex; flex-direction: column; }

    .inner {
      width: 100%; max-width: 480px;
      margin: 0 auto; padding: 24px 20px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    /* rainbow top bar on every screen */
    .screen::before {
      content: '';
      display: block;
      width: 100%; height: 5px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #00d4ff, #b24bff, #ff6b9d, #ff6b6b);
      background-size: 300% 100%;
      animation: rainbowShift 4s linear infinite;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════
       TYPOGRAPHY
    ═══════════════════════════════════════ */
    .logo-title {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900; color: var(--gold);
      text-shadow: 0 0 40px rgba(255,215,0,.5);
      text-align: center; line-height: 1.1;
    }
    .logo-sub {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      color: var(--dim); text-align: center; margin-top: 4px;
    }

    /* ═══════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════ */
    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; border: none; border-radius: 99px;
      font-weight: 800; cursor: pointer; transition: .15s;
      font-family: inherit; font-size: 1.15rem; padding: 16px 36px;
      width: 100%; max-width: 360px;
    }
    .btn:active { transform: scale(.96); }

    .btn-gold {
      background: linear-gradient(90deg, #ff9500, #FFD700, #ff6b9d, #FFD700, #ff9500);
      background-size: 300% 100%;
      animation: rainbowShift 3s linear infinite;
      color: #000; box-shadow: 0 4px 28px rgba(255,180,80,.45);
      font-size: 1.2rem;
    }
    .btn-gold:hover { box-shadow: 0 6px 36px rgba(255,180,80,.65); }

    .btn-green {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #000;
      font-size: clamp(1.1rem, 4vw, 1.5rem); padding: 20px 24px;
      box-shadow: 0 4px 24px rgba(0,230,118,.45);
    }
    .btn-red {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff;
      font-size: clamp(1.1rem, 4vw, 1.5rem); padding: 20px 24px;
      box-shadow: 0 4px 24px rgba(255,71,87,.45);
    }
    .btn-ghost {
      background: rgba(255,255,255,.08);
      border: 2px solid rgba(255,255,255,.2);
      color: var(--txt); padding: 14px 32px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.14); }

    .num-row { display: flex; gap: 14px; justify-content: center; }
    .num-btn {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.07);
      color: var(--txt); font-size: 2rem; font-weight: 900;
      cursor: pointer; transition: .2s; font-family: inherit;
    }
    .num-btn.sel {
      background: linear-gradient(135deg, var(--pink), var(--purp));
      color: #fff; border-color: var(--pink);
      box-shadow: 0 0 28px rgba(178,75,255,.55);
      transform: scale(1.08);
    }
    .num-btn:active { transform: scale(.9); }

    /* ═══════════════════════════════════════
       SETUP SCREEN
    ═══════════════════════════════════════ */
    .setup-section { width: 100%; }
    .setup-label {
      font-size: 1rem; font-weight: 700; color: var(--dim);
      margin-bottom: 12px; text-align: center;
    }

    .team-row {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,.06);
      border: 2px solid rgba(255,255,255,.1);
      border-radius: var(--rad); padding: 14px 18px;
      margin-bottom: 10px; transition: .25s;
      backdrop-filter: blur(10px);
    }
    .team-row:focus-within {
      border-color: var(--team-border, rgba(255,107,53,.5));
      background: rgba(255,255,255,.1);
      box-shadow: 0 0 24px var(--team-s, rgba(255,107,53,.25));
    }

    .team-icon-big { font-size: 2.2rem; flex-shrink: 0; }

    .team-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--txt); font-size: 1.25rem; font-weight: 700;
      font-family: inherit;
    }
    .team-input::placeholder { color: #475569; }

    /* ═══════════════════════════════════════
       GAME HEADER
    ═══════════════════════════════════════ */
    #g-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.2);
      padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }

    #g-round {
      font-size: .95rem; font-weight: 700; color: var(--gold);
      white-space: nowrap; text-shadow: 0 0 12px rgba(255,215,0,.4);
    }

    #g-scores {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .score-pill {
      font-size: .8rem; font-weight: 800;
      padding: 4px 10px; border-radius: 99px;
      border: 2px solid; white-space: nowrap;
    }

    #btn-lang {
      background: rgba(178,75,255,.2);
      border: 1.5px solid rgba(178,75,255,.45);
      color: var(--txt); border-radius: 8px;
      padding: 5px 10px; font-size: .82rem; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }

    /* ═══════════════════════════════════════
       TEAM BANNER
    ═══════════════════════════════════════ */
    .team-banner {
      margin: 16px 16px 0;
      border-radius: var(--rad);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      border: 2px solid; position: relative; overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .team-banner::before {
      content: ''; position: absolute; inset: 0;
      background: currentColor; opacity: .1;
    }
    .team-banner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 60%);
    }
    .tb-icon { font-size: 2.5rem; }
    .tb-name { font-size: 1.6rem; font-weight: 900; flex: 1; }
    .tb-turn { font-size: 1rem; font-weight: 700; opacity: .75; }

    /* ═══════════════════════════════════════
       CHALLENGE CARD
    ═══════════════════════════════════════ */
    #g-card-wrap { padding: 16px; width: 100%; }

    .c-card {
      background: rgba(255,255,255,.05);
      border: 2px solid rgba(255,255,255,.1);
      border-radius: var(--rad);
      padding: 28px 24px; text-align: center;
      transition: .3s; width: 100%;
      backdrop-filter: blur(10px);
    }
    .c-card.closed {
      background: linear-gradient(135deg,
        rgba(178,75,255,.22), rgba(13,5,32,.95), rgba(0,100,220,.16));
      border-color: rgba(178,75,255,.4);
      min-height: 220px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 48px rgba(178,75,255,.18), inset 0 0 60px rgba(178,75,255,.06);
    }

    .card-qmarks {
      font-size: 3rem; letter-spacing: 8px; opacity: .5; margin-bottom: 12px;
    }
    .card-hint {
      font-size: 1.1rem; color: var(--cyan); font-weight: 700;
      text-shadow: 0 0 18px rgba(0,212,255,.5);
    }

    .c-cat {
      display: inline-block;
      background: linear-gradient(135deg, rgba(178,75,255,.3), rgba(0,212,255,.22));
      border: 1px solid rgba(178,75,255,.35);
      border-radius: 99px; padding: 4px 14px;
      font-size: .8rem; font-weight: 700; color: var(--cyan);
      margin-bottom: 14px;
    }
    .c-emoji { font-size: 3.5rem; margin-bottom: 10px; display: block; }
    .c-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 10px; }
    .c-desc  { font-size: 1rem; color: var(--dim); line-height: 1.6; margin-bottom: 14px; }
    .c-time  { font-size: .9rem; color: var(--gold); font-weight: 700; }

    @keyframes cardFlip {
      0%   { transform: scale(1) rotateY(0); opacity: 1; }
      45%  { transform: scale(.85) rotateY(90deg); opacity: 0; }
      55%  { transform: scale(.85) rotateY(90deg); opacity: 0; }
      100% { transform: scale(1) rotateY(0); opacity: 1; }
    }
    .flipping { animation: cardFlip .75s ease; }

    /* ═══════════════════════════════════════
       TIMER
    ═══════════════════════════════════════ */
    #g-timer-wrap { padding: 0 16px 10px; text-align: center; }

    #timer-num {
      font-size: clamp(5rem, 22vw, 8rem);
      font-weight: 900; line-height: 1;
      color: var(--green); transition: color .5s;
      text-shadow: 0 0 30px rgba(0,230,118,.45);
    }
    #timer-num.yellow { color: #ffd93d; text-shadow: 0 0 30px rgba(255,217,61,.45); }
    #timer-num.red    { color: var(--red); text-shadow: 0 0 30px rgba(255,71,87,.55); }

    @keyframes timerPulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.08); }
    }
    #timer-num.urgent { animation: timerPulse .35s infinite; }

    .timer-bar-track {
      height: 14px; background: rgba(255,255,255,.08);
      border-radius: 99px; overflow: hidden; margin: 8px 0;
    }
    #timer-bar {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #ff4757 0%, #ffd93d 50%, #00e676 100%);
      transition: width 1s linear;
    }
    #timer-label { font-size: .9rem; color: var(--dim); font-weight: 600; }

    .time-up-banner {
      font-size: 2rem; font-weight: 900; color: var(--red);
      text-align: center; padding: 10px 0;
      animation: timerPulse .5s infinite;
      text-shadow: 0 0 20px rgba(255,71,87,.6);
    }

    /* ═══════════════════════════════════════
       ACTION BUTTONS
    ═══════════════════════════════════════ */
    #g-actions { padding: 10px 16px 20px; display: flex; flex-direction: column; gap: 12px; }

    .judge-row { display: flex; gap: 12px; }
    .judge-row .btn { flex: 1; max-width: none; }

    /* ═══════════════════════════════════════
       LEADERBOARD SCREEN
    ═══════════════════════════════════════ */
    .lb-title {
      font-size: 1.8rem; font-weight: 900; color: var(--gold);
      text-align: center; text-shadow: 0 0 20px rgba(255,215,0,.4);
    }
    .lb-sub { font-size: 1rem; color: var(--dim); text-align: center; }

    .lb-row {
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,.05);
      border: 2px solid rgba(255,255,255,.08);
      border-radius: var(--rad); padding: 16px 20px; width: 100%;
      transition: .2s; backdrop-filter: blur(8px);
    }
    .lb-row.rank1 {
      border-color: var(--gold);
      box-shadow: 0 0 28px rgba(255,215,0,.3);
      background: rgba(255,215,0,.08);
    }
    .lb-row.rank2 { border-color: #94a3b8; background: rgba(148,163,184,.06); }
    .lb-row.rank3 { border-color: #CD7F32; background: rgba(205,127,50,.06); }

    .lb-medal { font-size: 2rem; flex-shrink: 0; }
    .lb-icon  { font-size: 1.8rem; flex-shrink: 0; }
    .lb-name  { flex: 1; font-size: 1.2rem; font-weight: 800; }
    .lb-pts   { font-size: 1.6rem; font-weight: 900; color: var(--gold); }

    /* ═══════════════════════════════════════
       WINNER SCREEN
    ═══════════════════════════════════════ */
    #s-winner { justify-content: center; }

    .win-trophy { font-size: clamp(5rem, 20vw, 8rem); text-align: center; margin-bottom: 10px;
      animation: float 2.5s ease-in-out infinite; }
    .win-label  { font-size: 1.4rem; color: var(--dim); font-weight: 700; text-align: center; }
    .win-icon   { font-size: clamp(4rem, 16vw, 6rem); text-align: center; margin: 8px 0; }
    .win-name   {
      font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; text-align: center;
      background: linear-gradient(135deg, var(--gold), var(--pink), var(--purp), var(--cyan));
      background-size: 300% 300%; animation: rainbowShift 3s linear infinite;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .win-pts    { font-size: 1.3rem; color: var(--dim); text-align: center; margin-bottom: 16px; }

    /* ═══════════════════════════════════════
       OVERLAYS
    ═══════════════════════════════════════ */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(60,0,100,.55);
      align-items: center; justify-content: center; flex-direction: column;
      backdrop-filter: blur(14px);
    }
    .overlay.show { display: flex; }

    .ov-box {
      background: linear-gradient(135deg,
        rgba(255,255,255,.18), rgba(120,0,180,.55), rgba(0,60,180,.4));
      border: 2px solid rgba(178,75,255,.45);
      border-radius: 28px; padding: 40px 32px;
      text-align: center; max-width: 340px; width: 90%;
      box-shadow: 0 0 70px rgba(178,75,255,.35), 0 0 140px rgba(178,75,255,.12);
    }

    @keyframes zoomIn {
      from { transform: scale(.5); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    .ov-box { animation: zoomIn .4s cubic-bezier(.34,1.56,.64,1); }

    .ov-round {
      font-size: clamp(3rem, 12vw, 5rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--pink), var(--purp));
      background-size: 300% 300%; animation: rainbowShift 3s linear infinite;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .ov-sub   { font-size: 1.3rem; color: var(--dim); margin-top: 8px; }

    @keyframes ptsPop {
      0%   { transform: scale(.5); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1);  opacity: 1; }
    }
    .pts-big {
      font-size: clamp(3rem, 14vw, 5.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold), var(--gold2), var(--pink));
      background-size: 300% 300%; animation: ptsPop .5s cubic-bezier(.34,1.56,.64,1), rainbowShift 3s linear infinite .5s;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .pts-sub { font-size: 1.4rem; color: var(--dim); margin-top: 8px; }
    .pts-bonus {
      font-size: 1.2rem; margin-top: 6px; font-weight: 800;
      background: linear-gradient(90deg, var(--gold), var(--lime));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ═══════════════════════════════════════
       CONFETTI CANVAS
    ═══════════════════════════════════════ */
    #confetti-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
    }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 400px) {
      .c-title { font-size: 1.3rem; }
      .btn { font-size: 1rem; padding: 14px 24px; }
      .num-btn { width: 60px; height: 60px; font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════
     SETUP SCREEN
════════════════════════════════════ -->
<div id="s-setup" class="screen active">
  <div class="inner">
    <div>
      <div class="logo-sub" id="setup-title" style="font-size:clamp(.95rem,3.2vw,1.2rem);letter-spacing:.08em;opacity:.7;margin-bottom:6px;">🏆 המירוץ למיליון</div>
      <div id="setup-sub" style="font-size:clamp(2.4rem,10vw,4rem);font-weight:900;line-height:1.1;text-align:center;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#00d4ff,#b24bff,#ff6b9d,#ff6b6b);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbowShift 3s linear infinite;filter:drop-shadow(0 0 18px rgba(255,107,157,.4));">🎂 יום הולדת לעמית! 🎉</div>
    </div>

    <div class="setup-section">
      <div class="setup-label" id="lbl-numteams">כמה צוותים?</div>
      <div class="num-row">
        <button class="num-btn" data-n="2" onclick="selectNumTeams(2)">2</button>
        <button class="num-btn" data-n="3" onclick="selectNumTeams(3)">3</button>
        <button class="num-btn" data-n="4" onclick="selectNumTeams(4)">4</button>
      </div>
    </div>

    <div id="setup-team-inputs" class="setup-section" style="width:100%"></div>

    <button class="btn btn-gold" onclick="startGame()" id="btn-start">יצאו לדרך! 🏃</button>
    <button id="btn-lang-setup" onclick="toggleLang()"
      style="background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
             color:#e2e8f0;border-radius:8px;padding:7px 16px;font-size:.9rem;
             font-weight:700;cursor:pointer;font-family:inherit;">EN</button>
  </div>
</div>

<!-- ════════════════════════════════════
     GAME SCREEN
════════════════════════════════════ -->
<div id="s-game" class="screen" style="flex-direction:column">
  <div id="g-header">
    <div id="g-round">סיבוב 1 מ-5</div>
    <div id="g-scores"></div>
    <button id="btn-lang" onclick="toggleLang()">EN</button>
  </div>

  <div id="g-team-banner"></div>

  <div id="g-card-wrap">
    <div id="g-card" class="c-card closed">
      <div class="card-qmarks">❓❓❓</div>
      <div class="card-hint">משכו אתגר!</div>
    </div>
  </div>

  <div id="g-timer-wrap" style="display:none">
    <div id="timer-num">30</div>
    <div class="timer-bar-track"><div id="timer-bar" style="width:100%"></div></div>
    <div id="timer-label"></div>
  </div>

  <div id="g-actions"></div>
</div>

<!-- ════════════════════════════════════
     LEADERBOARD SCREEN
════════════════════════════════════ -->
<div id="s-leaderboard" class="screen">
  <div class="inner">
    <div class="lb-title" id="lb-title">📊 טבלת הניקוד</div>
    <div class="lb-sub" id="lb-sub"></div>
    <div id="lb-list" style="width:100%;display:flex;flex-direction:column;gap:10px"></div>
    <button class="btn btn-gold" id="lb-btn" onclick="nextRound()"></button>
    <button id="btn-lang-lb" onclick="toggleLang()"
      style="background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
             color:#e2e8f0;border-radius:8px;padding:7px 16px;font-size:.9rem;
             font-weight:700;cursor:pointer;font-family:inherit;margin-top:-4px;">EN</button>
  </div>
</div>

<!-- ════════════════════════════════════
     WINNER SCREEN
════════════════════════════════════ -->
<div id="s-winner" class="screen">
  <div class="inner">
    <div class="win-trophy">🏆</div>
    <div class="win-label" id="win-label">המנצחים הם...</div>
    <div class="win-icon" id="win-icon"></div>

function tone(f, d, type='sine', vol=.22, delay=0) {
  try {
    const ctx = ac(), t = ctx.currentTime + delay;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = f;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(.001, t + d);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t + d + .01);
  } catch(e) {}
}

function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function pickChallenge() {
  let pool = CHALLENGES.filter(c => !G.usedIds.includes(c.id));
  if (pool.length === 0) { G.usedIds = []; pool = [...CHALLENGES]; }
  return shuffle(pool)[0];
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ════════════════════════════════════════════════
   LANGUAGE
════════════════════════════════════════════════ */
function toggleLang() {
  lang = lang === 'he' ? 'en' : 'he';
  localStorage.setItem('hm-lang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir  = lang === 'he' ? 'rtl' : 'ltr';
  const btn = lang === 'he' ? 'EN' : 'עב';
  ['btn-lang','btn-lang-setup','btn-lang-lb','btn-lang-win'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = btn;
  });
  rerenderCurrentScreen();
}

function rerenderCurrentScreen() {
  const active = document.querySelector('.screen.active');
  if (!active) return;
  const id = active.id;
  if (id === 's-setup') renderSetup();
  else if (id === 's-game') renderGame();
  else if (id === 's-leaderboard') renderLeaderboard();
  else if (id === 's-winner') renderWinner();
}

   SETUP SCREEN
════════════════════════════════════════════════ */
function renderSetup() {
  document.getElementById('setup-title').textContent = s().setupTitle;
  document.getElementById('setup-sub').textContent   = s().setupSub;
  document.getElementById('lbl-numteams').textContent = s().numTeams;
  document.getElementById('btn-start').textContent   = s().startRace;
  renderTeamInputs();
}

function selectNumTeams(n) {
  numTeams = n;
  document.querySelectorAll('.num-btn').forEach(b => {
    b.classList.toggle('sel', +b.dataset.n === n);
  });
  renderTeamInputs();
}

function renderTeamInputs() {
  const c = document.getElementById('setup-team-inputs');
  c.innerHTML = '';
  for (let i = 0; i < numTeams; i++) {
    const cfg = TEAMS_CFG[i];
    const row = document.createElement('div');
    row.className = 'team-row';
    row.style.setProperty('--team-border', cfg.border);
    row.style.borderColor = cfg.border;
    row.innerHTML = `
      <span class="team-icon-big">${cfg.icon}</span>
      <input class="team-input" id="tinput-${i}"
        type="text" maxlength="18"
        placeholder="${esc(s().placeholder[i])}"
        aria-label="${esc(s().teamName(i))}">`;
    c.appendChild(row);
  }
}

function startGame() {
  G.teams = [];
  for (let i = 0; i < numTeams; i++) {
    const inp = document.getElementById(`tinput-${i}`);
    const raw = inp ? inp.value.trim() : '';
    const cfg = TEAMS_CFG[i];
    G.teams.push({
      name: raw || s().placeholder[i],
      icon: cfg.icon,
      color: cfg.color,
      border: cfg.border,
      pts: 0,
    });
  }
  G.round = 1; G.teamIdx = 0;
  G.usedIds = []; G.phase = 'drawing';
  G.challenge = null; G.timedOut = false;
  if (G.timerInt) { clearInterval(G.timerInt); G.timerInt = null; }

  showScreen('s-game');
  showRoundOverlay(G.round, () => renderGame());
}

/* ════════════════════════════════════════════════
   GAME SCREEN RENDER
════════════════════════════════════════════════ */
function setTeamCSSVars(team) {
  document.documentElement.style.setProperty('--team', team.color);
  document.documentElement.style.setProperty('--team-s', team.border);
}

function renderGame() {
  const team = G.teams[G.teamIdx];
  setTeamCSSVars(team);

  // Header
  document.getElementById('g-round').textContent = s().roundLabel(G.round, G.maxRounds);
  renderMiniScores();

  // Team banner
  document.getElementById('g-team-banner').innerHTML = `
    <div class="team-banner" style="border-color:${team.border};color:${team.color}">
      <span class="tb-icon">${team.icon}</span>
      <span class="tb-name">${esc(team.name)}</span>
      <span class="tb-turn">${s().yourTurn}</span>
    </div>`;

  renderPhase();
}

function renderMiniScores() {
  document.getElementById('g-scores').innerHTML = G.teams.map(t =>
    `<span class="score-pill" style="color:${t.color};border-color:${t.border}">${t.icon} ${t.pts}</span>`
  ).join('');
}

function renderPhase() {
  const wrap = document.getElementById('g-card-wrap');
  const timerWrap = document.getElementById('g-timer-wrap');
  const actions = document.getElementById('g-actions');
  const ch = G.challenge;

  if (G.phase === 'drawing') {
    timerWrap.style.display = 'none';
    wrap.style.display = 'block';
    document.getElementById('g-card').className = 'c-card closed';
    document.getElementById('g-card').innerHTML = `
      <div class="card-qmarks">❓❓❓</div>
      <div class="card-hint" style="font-size:1.2rem;color:#94a3b8;margin-top:8px">
        ${esc(s().drawBtn.replace('🎴 ',''))}
      </div>`;
    actions.innerHTML = `
      <button class="btn btn-gold" onclick="drawChallenge()">${s().drawBtn}</button>`;

  } else if (G.phase === 'ready') {
    timerWrap.style.display = 'none';
    wrap.style.display = 'block';
    document.getElementById('g-card').className = 'c-card';
    document.getElementById('g-card').innerHTML = cardContent(ch);
    actions.innerHTML = `
      <button class="btn btn-gold" onclick="startTimer()">${s().startTimer}</button>`;

  } else if (G.phase === 'timing') {
    wrap.style.display = 'block';
    document.getElementById('g-card').className = 'c-card';
    document.getElementById('g-card').innerHTML = cardContent(ch);
    timerWrap.style.display = 'block';
    updateTimerDisplay();
    renderJudgeButtons(actions, false);

  } else if (G.phase === 'done') {
    wrap.style.display = 'none';
    timerWrap.style.display = 'none';
    if (G.timedOut) {
      actions.innerHTML = `
        <div class="time-up-banner">${s().timeUp}</div>
        <div style="text-align:center;font-size:1rem;color:#94a3b8;margin-bottom:8px">${s().judgeQ}</div>
        <div class="judge-row">
          <button class="btn btn-green" onclick="judgeResult(true)">${s().success}</button>
          <button class="btn btn-red"   onclick="judgeResult(false)">${s().fail}</button>
        </div>`;
    } else {
      renderJudgeButtons(actions, true);
    }
  }
}

function cardContent(ch) {
  const str = ch[lang] || ch.he;
  return `
    <div class="c-cat">${s().catName[ch.cat]}</div>
    <span class="c-emoji">${ch.e}</span>
    <div class="c-title">${esc(str.t)}</div>
    <div class="c-desc">${esc(str.d)}</div>
    <div class="c-time">${s().timerHint(ch.sec)}</div>`;
}

function renderJudgeButtons(actions, showQ) {
  actions.innerHTML = `
    ${showQ ? `<div style="text-align:center;font-size:1rem;color:#94a3b8;margin-bottom:4px">${s().judgeQ}</div>` : ''}
    <div class="judge-row">
      <button class="btn btn-green" onclick="judgeResult(true)">${s().success}</button>
      <button class="btn btn-red"   onclick="judgeResult(false)">${s().fail}</button>
    </div>`;
}

/* ════════════════════════════════════════════════
   CHALLENGE CARD FLIP
════════════════════════════════════════════════ */
function drawChallenge() {
  SFX.draw();
  const ch = pickChallenge();
  G.usedIds.push(ch.id);
  const card = document.getElementById('g-card');
  card.classList.add('flipping');

  setTimeout(() => {
    G.challenge = ch;
    G.phase = 'ready';
    card.className = 'c-card';
    card.innerHTML = cardContent(ch);
    document.getElementById('g-actions').innerHTML = `
      <button class="btn btn-gold" onclick="startTimer()">${s().startTimer}</button>`;
    document.getElementById('g-timer-wrap').style.display = 'none';
  }, 375);
}

/* ════════════════════════════════════════════════
   TIMER
════════════════════════════════════════════════ */
function startTimer() {
  G.timeTotal = G.challenge.sec;
  G.timeLeft  = G.challenge.sec;
  G.timerStartLeft = G.challenge.sec;
  G.timedOut  = false;
  G.phase     = 'timing';
  document.getElementById('g-timer-wrap').style.display = 'block';
  document.getElementById('g-actions').innerHTML = '';
  updateTimerDisplay();

  G.timerInt = setInterval(() => {
    G.timeLeft--;
    updateTimerDisplay();
    if (G.timeLeft > 0 && G.timeLeft <= 5) SFX.urgent();
    else if (G.timeLeft > 0) SFX.tick();
    if (G.timeLeft <= 0) {
      clearInterval(G.timerInt); G.timerInt = null;
      SFX.timeUp();
      G.timedOut = true;
      G.phase = 'done';
      renderPhase();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el  = document.getElementById('timer-num');
  const bar = document.getElementById('timer-bar');
  const lbl = document.getElementById('timer-label');
  const pct = G.timeLeft / G.timeTotal;

  el.textContent = G.timeLeft;
  bar.style.width = (pct * 100) + '%';

  el.classList.remove('yellow','red','urgent');
  if (pct <= .25) {
    el.classList.add('red');
    bar.style.background = 'var(--red)';
    if (G.timeLeft <= 5) el.classList.add('urgent');
  } else if (pct <= .5) {
    el.classList.add('yellow');
    bar.style.background = '#eab308';
  } else {
    bar.style.background = 'var(--green)';
  }
  lbl.textContent = s().timeLeft;
}

/* ════════════════════════════════════════════════
   JUDGING & SCORING
════════════════════════════════════════════════ */
function judgeResult(success) {
  if (G.timerInt) { clearInterval(G.timerInt); G.timerInt = null; }

  let pts = 0, bonus = false;
  if (success) {
    pts = 10;
    if (!G.timedOut && G.timeLeft > G.timeTotal * .5) { pts += 5; bonus = true; }
    SFX.success();
  } else {
    SFX.fail();
  }

  G.teams[G.teamIdx].pts += pts;

  showResultOverlay(pts, bonus, success, () => advanceGame());
}

function advanceGame() {
  const lastTeam = G.teamIdx === G.teams.length - 1;

  if (lastTeam) {
    if (G.round >= G.maxRounds) {
      showScreen('s-leaderboard');
      renderLeaderboard(true);
    } else {
      showScreen('s-leaderboard');
      renderLeaderboard(false);
    }
  } else {
    G.teamIdx++;
    G.phase = 'drawing';
    G.challenge = null;
    G.timedOut  = false;
    fadeGame(() => renderGame());
  }
}

function fadeGame(cb) {
  const el = document.getElementById('s-game');
  el.style.transition = 'opacity .35s';
  el.style.opacity = '0';
  setTimeout(() => { cb(); el.style.opacity = '1'; }, 350);
}

/* ════════════════════════════════════════════════
   LEADERBOARD SCREEN
════════════════════════════════════════════════ */
function renderLeaderboard(isFinal = false) {
  document.getElementById('lb-title').textContent = s().lb;
  document.getElementById('lb-sub').textContent   = s().afterRound(G.round);

  const sorted = [...G.teams].sort((a,b) => b.pts - a.pts);
  const list = document.getElementById('lb-list');
  list.innerHTML = '';
  sorted.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row ' + (i < 3 ? `rank${i+1}` : '');
    row.innerHTML = `
      <span class="lb-medal">${s().medals[i]}</span>
      <span class="lb-icon">${t.icon}</span>
      <span class="lb-name">${esc(t.name)}</span>
      <span class="lb-pts" style="color:${t.color}">${t.pts} ${s().pts}</span>`;
    list.appendChild(row);
  });

  const btn = document.getElementById('lb-btn');
  if (isFinal) {
    btn.textContent = s().finalBtn;
    btn.onclick = () => showWinner();
  } else {
    btn.textContent = s().nextRound;
    btn.onclick = () => nextRound();
  }
}

function nextRound() {
  G.round++;
  G.teamIdx = 0;
  G.phase   = 'drawing';
  G.challenge = null;
  G.timedOut  = false;
  showScreen('s-game');
  showRoundOverlay(G.round, () => renderGame());
}

/* ════════════════════════════════════════════════
   WINNER SCREEN
════════════════════════════════════════════════ */
function showWinner() {
  const sorted = [...G.teams].sort((a,b) => b.pts - a.pts);
  const top = sorted[0];
  const tied = sorted.filter(t => t.pts === top.pts);

  document.getElementById('win-label').textContent = tied.length > 1 ? s().tieLabel : s().winLabel;
  document.getElementById('win-icon').textContent  = tied.length > 1
    ? tied.map(t=>t.icon).join(' ')
    : top.icon;
  document.getElementById('win-name').textContent  = tied.length > 1
    ? tied.map(t=>t.name).join(' + ')
    : top.name;
  document.getElementById('win-pts').textContent   = s().winWith(top.name, top.pts);
  document.getElementById('btn-again').textContent = s().playAgain;

  const lb = document.getElementById('win-lb');
  lb.innerHTML = '';
  sorted.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row ' + (i < 3 ? `rank${i+1}` : '');
    row.innerHTML = `
      <span class="lb-medal">${s().medals[i]}</span>
      <span class="lb-icon">${t.icon}</span>
      <span class="lb-name">${esc(t.name)}</span>
      <span class="lb-pts" style="color:${t.color}">${t.pts} ${s().pts}</span>`;
    lb.appendChild(row);
  });

  showScreen('s-winner');
  renderWinner();
  SFX.winner();
  launchConfetti();
}

function renderWinner() {
  document.getElementById('btn-again').textContent = s().playAgain;
}

function resetGame() {
  stopConfetti();
  numTeams = 2;
  document.querySelectorAll('.num-btn').forEach(b => {
    b.classList.toggle('sel', +b.dataset.n === 2);
  });
  showScreen('s-setup');
  renderSetup();
}

/* ════════════════════════════════════════════════
   OVERLAYS
════════════════════════════════════════════════ */
function showRoundOverlay(round, cb) {
  const ov = document.getElementById('o-round');
  document.getElementById('o-round-num').textContent = s().roundStarts(round);
  document.getElementById('o-round-sub').textContent  = s().begins;
  ov.classList.add('show');
  SFX.roundStart();
  setTimeout(() => { ov.classList.remove('show'); setTimeout(cb, 200); }, 1900);
}

function showResultOverlay(pts, bonus, success, cb) {
  const ov = document.getElementById('o-result');
  document.getElementById('o-pts').textContent      = success ? s().gotPts(pts) : '0 ' + s().pts;
  document.getElementById('o-pts-sub').textContent  = success ? '' : s().gotZero;
  document.getElementById('o-pts-bonus').textContent = bonus ? s().speedBonus : '';
  ov.classList.add('show');
  setTimeout(() => { ov.classList.remove('show'); setTimeout(cb, 200); }, 1800);
}

/* ════════════════════════════════════════════════
   CONFETTI
════════════════════════════════════════════════ */
const cnv = document.getElementById('confetti-canvas');
const cx  = cnv.getContext('2d');
let parts = [], confAnim = null;
const COLS = ['#FFD700','#FF6B35','#4CC9F0','#C77DFF','#52B788','#FF2D55','#ffffff'];

function launchConfetti() {
  cnv.width = window.innerWidth; cnv.height = window.innerHeight;
  parts = Array.from({length:200}, () => ({
    x: Math.random()*cnv.width, y: Math.random()*-cnv.height*.7,
    w: Math.random()*12+4, h: Math.random()*6+3,
    col: COLS[Math.floor(Math.random()*COLS.length)],
    vy: Math.random()*3+2, vx: (Math.random()-.5)*2,
    rot: Math.random()*360, rs: (Math.random()-.5)*7,
  }));
  animConf();
}

function animConf() {
  cx.clearRect(0,0,cnv.width,cnv.height);
  let alive = false;
  parts.forEach(p => {
    p.y+=p.vy; p.x+=p.vx; p.rot+=p.rs;
    if(p.y<cnv.height+20) alive=true;
    cx.save();
    cx.translate(p.x,p.y); cx.rotate(p.rot*Math.PI/180);
    cx.fillStyle=p.col; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    cx.restore();
  });
  if(alive) confAnim=requestAnimationFrame(animConf);
  else stopConfetti();
}

function stopConfetti() {
  if(confAnim){cancelAnimationFrame(confAnim);confAnim=null;}
  cx.clearRect(0,0,cnv.width,cnv.height);
}

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
document.documentElement.lang = lang;
document.documentElement.dir  = lang === 'he' ? 'rtl' : 'ltr';

selectNumTeams(2);
renderSetup();

// Prevent double-tap zoom on iOS
document.addEventListener('touchend', e => {
  if(e.timeStamp - (document._lt||0) < 300) e.preventDefault();
  document._lt = e.timeStamp;
}, {passive:false});
</script>
