<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liam Markov — Full-Stack Developer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Decorative background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-avatar-wrap">
        <div class="hero-avatar">LM</div>
      </div>
      <div class="hero-text">
        <h1 class="hero-name">Liam Markov</h1>
        <p class="hero-headline">Full-Stack Developer</p>
      </div>
    </div>
  </header>

  <!-- PROJECTS -->
  <main>
    <section class="projects-section">
      <h2 class="section-title">Projects</h2>
      <div class="projects-grid" id="projects-grid">
        <!-- Cards injected by script.js -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Built by Liam Markov &copy; <span id="year"></span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
