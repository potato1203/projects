<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinecraftDraw - צייר דמויות מיינקראפט 🎮</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --green:  #3a7d1e;
            --dark:   #1a3a0a;
            --dirt:   #8b6343;
            --gold:   #f5c518;
            --bg:     #e8eed8;
            --red:    #c0392b;
        }

        @media print {
            body * { visibility: hidden; }
            #print-template, #print-template * { visibility: visible; }
            #print-template { position: absolute; left: 0; top: 0; width: 100%; display: flex !important; flex-direction: column; align-items: center; padding-top: 50px; }
            .no-print { display: none !important; }
        }

        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; text-align: center; user-select: none; overflow-x: hidden; }

        header {
            background: var(--dark);
            color: white;
            padding: 0 0 20px;
            border-bottom: 6px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .header-grass {
            background: repeating-linear-gradient(90deg, #4caf50 0 8px, #388e3c 8px 16px);
            height: 12px;
            width: 100%;
            margin-bottom: 16px;
            image-rendering: pixelated;
        }
        h1 { margin: 0 0 6px; font-family: 'Press Start 2P', monospace; font-size: clamp(1rem, 4vw, 1.6rem); letter-spacing: 1px; color: var(--gold); text-shadow: 3px 3px 0 #000; }
        .subtitle { margin: 0; font-size: 1rem; opacity: 0.75; }

        .nav-tools { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 14px 0 0; }
        #search { padding: 11px 22px; width: 85%; max-width: 450px; border-radius: 6px; border: 3px solid var(--gold); outline: none; font-size: 1.05rem; direction: rtl; background: #fffde7; }
        .btn-print { background: var(--dirt); color: white; padding: 11px 28px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 8px rgba(0,0,0,0.25); transition: 0.2s; }
        .btn-print:hover { transform: scale(1.05); background: #a0714e; }

        .cat-filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 14px 16px 0; }
        .cat-btn { padding: 7px 16px; border-radius: 6px; border: 2px solid #ccc; background: white; cursor: pointer; font-size: 0.88rem; font-weight: bold; transition: 0.2s; }
        .cat-btn:hover { border-color: var(--green); }
        .cat-btn.active { background: var(--green); color: white; border-color: var(--green); }

        .count-bar { padding: 10px; color: #666; font-size: 0.9rem; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 18px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; padding: 14px 10px 10px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.2s; border: 3px solid #ddd; display: flex; flex-direction: column; align-items: center; min-height: 140px; }
        .card:hover { border-color: var(--green); transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.14); }
        .card img { width: 90px; height: 120px; object-fit: contain; margin-bottom: 8px; image-rendering: pixelated; }
        .card b { font-size: 0.8rem; color: #222; text-align: center; line-height: 1.3; }

        #tutorial { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; flex-direction: column; align-items: center; overflow-y: auto; }

        .nav-bar { width: 100%; background: var(--dark); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .nav-bar h2 { margin: 0; font-size: 1.1rem; }
        .btn-close { padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 0.95rem; background: var(--red); color: white; }

        .phase-indicator { display: flex; gap: 12px; margin: 18px 0 0; flex-wrap: wrap; justify-content: center; }
        .phase-btn { padding: 10px 22px; border-radius: 6px; border: 2px solid #ddd; background: #f5f5f5; font-weight: bold; opacity: 0.5; font-size: 0.95rem; transition: 0.2s; }
        .phase-btn.active { opacity: 1; border-color: var(--green); background: #e8f5e9; color: var(--dark); transform: scale(1.08); }

        #coord-hint { font-size: 3.5rem; font-weight: bold; color: var(--green); margin: 8px 0 0; letter-spacing: 2px; }

        .grid-wrapper { position: relative; width: 80vw; max-width: 420px; aspect-ratio: 2/3; margin: 30px auto 10px; }
        .labels-top { position: absolute; top: -34px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; color: var(--dark); font-size: 1.5rem; }
        .labels-side { position: absolute; right: -34px; height: 100%; display: flex; flex-direction: column; justify-content: space-around; font-weight: bold; color: var(--dark); font-size: 1.5rem; }
        .image-container { position: relative; width: 100%; height: 100%; border: 5px solid #222; background: #c8d8a8; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); box-shadow: 0 8px 25px rgba(0,0,0,0.25); }

        #mainImg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; transition: filter 0.5s; image-rendering: pixelated; }
        .mode-pencil { filter: grayscale(1) contrast(180%) brightness(1.2) opacity(0.22); }

        .cell { position: relative; border: 1px solid rgba(0,0,0,0.08); z-index: 2; transition: 0.2s; }
        .cell.hidden { background: rgba(200,216,168,0.98); }
        .cell.active { border: 4px solid var(--gold); z-index: 10; animation: blink 0.9s infinite; background: transparent; }
        @keyframes blink { 0%, 100% { border-color: var(--gold); } 50% { border-color: transparent; } }

        .controls { display: flex; gap: 18px; margin: 22px 0; padding-bottom: 50px; }
        .nav-ctrl { padding: 13px 36px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; box-shadow: 0 4px 8px rgba(0,0,0,0.12); transition: 0.2s; }
        .nav-ctrl:hover { transform: scale(1.04); }
        .btn-green { background: var(--green); color: white; }
        .btn-grey { background: #666; color: white; }

        #print-template { display: none; }
        .printable-grid { width: 420px; height: 630px; border: 6px solid black; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); }
        .printable-cell { border: 1px solid #ccc; }

        .empty-state { padding: 60px 20px; color: #999; font-size: 1.2rem; grid-column: 1/-1; }
    </style>
</head>

<header class="no-print">
    <div class="header-grass"></div>

    <p class="subtitle">צייר דמויות ובלוקים מיינקראפט בשיטת הרשת</p>
    <div class="nav-tools">

        <button class="btn-print" onclick="window.print()">🖨️ הדפס דף רשת לציור</button>
    </div>
</header>

    <div id="coord-hint">א1</div>
    <div class="grid-wrapper">

        </div>
    </div>
    <div class="controls">
        <button class="nav-ctrl btn-grey" onclick="changeStep(-1)">⬅️ הקודם</button>

    </div>
</div>

<div id="print-template">
    <h2 style="font-size:2rem; font-family: monospace;">⛏️ MinecraftDraw - דף ציור</h2>

        <div class="printable-grid">

            <div class="printable-cell"></div><div class="printable-cell"></div><div class="printable-cell"></div><div class="printable-cell"></div>

    const COORDS = ['א1','ב1','ג1','ד1','א2','ב2','ג2','ד2','א3','ב3','ג3','ד3','א4','ב4','ג4','ד4'];
    const PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#c8d8a8"/><text y="55" x="50" text-anchor="middle" font-size="50">⛏️</text></svg>');

    let searchTerm = '';
    let activeCategory = 'all';
    let currentStep = 0;
    let currentPhase = 0;

    function renderCategories() {
        const container = document.getElementById('cat-filters');
        CATEGORIES.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn' + (c.id === 'all' ? ' active' : '');
            btn.textContent = c.label;
            btn.onclick = () => {
                activeCategory = c.id;
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGallery();
            };
            container.appendChild(btn);
        });
    }

    function renderGallery() {
        const gal = document.getElementById('gallery');
        const q = searchTerm.toLowerCase();
        const filtered = ALL_ITEMS.filter(f =>
            (activeCategory === 'all' || f.cat === activeCategory) &&
            (!q || f.name.toLowerCase().includes(q))
        );
        document.getElementById('count-bar').textContent = `${filtered.length} פריטים`;
        if (filtered.length === 0) { gal.innerHTML = '<p class="empty-state">לא נמצאו פריטים.</p>'; return; }
        gal.innerHTML = '';
        const frag = document.createDocumentFragment();
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openTutorial(item.name);
            const imgEl = document.createElement('img');
            imgEl.alt = item.name;
            imgEl.loading = 'lazy';
            imgEl.src = IMAGE_URLS[item.name] || PLACEHOLDER;
            imgEl.onerror = () => { imgEl.src = PLACEHOLDER; };
            const b = document.createElement('b');
            b.textContent = item.name;
            card.appendChild(imgEl);
            card.appendChild(b);
            frag.appendChild(card);
        });
        gal.appendChild(frag);
    }

    function filterItems() {
        searchTerm = document.getElementById('search').value;
        renderGallery();
    }

    function openTutorial(name) {
        currentStep = 0;
        currentPhase = 0;
        document.getElementById('tutorial').style.display = 'flex';
        document.getElementById('tName').innerText = name;
        document.body.style.overflow = 'hidden';
        const mainImg = document.getElementById('mainImg');
        mainImg.src = IMAGE_URLS[name] || PLACEHOLDER;
        document.getElementById('print-name').textContent = name;
        updateUI();
    }

    function updateUI() {
        document.getElementById('mainImg').className = currentPhase === 0 ? 'mode-pencil' : '';
        document.getElementById('phase0').classList.toggle('active', currentPhase === 0);
        document.getElementById('phase1').classList.toggle('active', currentPhase === 1);
        for (let i = 0; i < 16; i++) {
            const cell = document.getElementById('c' + i);
            if (i < currentStep)        cell.className = 'cell';
            else if (i === currentStep) cell.className = 'cell active';
            else                        cell.className = 'cell hidden';
        }
        document.getElementById('coord-hint').innerText = COORDS[currentStep];
        const isLast = currentStep === 15;
        document.getElementById('nextBtn').innerText =
            isLast ? (currentPhase === 0 ? 'עבור לצבעים 🎨' : 'סיימתי! 🎉') : 'הבא ➡️';
    }

    function changeStep(n) {
        if (currentStep === 15 && n > 0) {
            if (currentPhase === 0) { currentPhase = 1; currentStep = 0; }
            else { closeTutorial(); return; }
        } else {
            currentStep += n;
            if (currentStep < 0) {
                if (currentPhase === 1) { currentPhase = 0; currentStep = 15; }
                else { currentStep = 0; }
            }
        }
        updateUI();
    }

    function closeTutorial() {
        document.getElementById('tutorial').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    renderCategories();
    renderGallery();
</script>
</body>
</html>
