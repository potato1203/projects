<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מרוץ למיליון 🏆</title>
  <style>
    :root {
      --gold: #FFD700;
      --gold2: #FF9500;
      --bg: #08090f;
      --card: #10121c;
      --card-h: #181b2a;
      --done-c: #10b981;
      --epic-c: #a855f7;
      --txt: #e2e8f0;
      --dim: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, #04050a 0%, #0a0c17 100%);
      border-bottom: 1px solid rgba(255,215,0,.15);
      box-shadow: 0 4px 30px rgba(0,0,0,.6);
    }

    .h-inner {
      max-width: 1200px; margin: 0 auto; padding: 14px 20px 0;
    }

    .h-top {
      display: flex; justify-content: space-between;
      align-items: center; gap: 16px; flex-wrap: wrap;
    }

    .logo {
      font-size: 1.5rem; font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(255,215,0,.5);
      white-space: nowrap; letter-spacing: -.5px;
    }

    .score-block { text-align: center; }

    .score-num {
      font-size: 2.4rem; font-weight: 900; line-height: 1;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,.35);
      font-variant-numeric: tabular-nums;
    }

    .score-sub { font-size: .72rem; color: var(--dim); margin-top: 2px; }

    .tasks-badge {
      font-size: .85rem; color: #94a3b8; white-space: nowrap;
    }
    .tasks-badge b { color: var(--gold); }

    /* progress */
    .prog-wrap { margin: 12px 0 0; direction: ltr; }

    .prog-track {
      background: rgba(255,255,255,.06);
      border-radius: 99px; height: 12px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b35, var(--gold), #fffbe0);
      border-radius: 99px;
      transition: width .6s cubic-bezier(.34,1.56,.64,1);
      position: relative; min-width: 2px;
    }

    .prog-fill::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      animation: shine 2.2s infinite;
    }

    @keyframes shine {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(500%); }
    }

    .prog-labels {
      display: flex; justify-content: space-between;
      font-size: .72rem; color: var(--dim);
      padding: 5px 2px 11px;
    }
    .prog-pct { color: var(--gold); font-weight: 700; }

    /* category strip */
    .cat-strip {
      border-top: 1px solid rgba(255,255,255,.05);
      overflow-x: auto; scrollbar-width: none;
    }
    .cat-strip::-webkit-scrollbar { display: none; }

    .cat-row {
      display: flex; gap: 6px;
      padding: 9px 20px;
      width: max-content; min-width: 100%;
      max-width: 1200px; margin: 0 auto;
    }

    .cat-btn {
      padding: 6px 14px; border-radius: 99px;
      border: 1.5px solid rgba(255,255,255,.12);
      background: transparent; color: #94a3b8;
      cursor: pointer; font-size: .8rem; font-weight: 600;
      white-space: nowrap; transition: .16s;
    }
    .cat-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cat-btn.active {
      background: var(--gold); color: #000;
      border-color: var(--gold); font-weight: 700;
    }
    .cat-btn.is-epic { border-color: rgba(168,85,247,.35); color: #c084fc; }
    .cat-btn.is-epic.active { background: var(--epic-c); border-color: var(--epic-c); color: #fff; }

    /* ── GRID ───────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
      padding: 18px 18px 30px;
      max-width: 1200px; margin: 0 auto;
    }

    /* ── CARD ───────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: 20px; padding: 18px;
      border: 1.5px solid rgba(255,255,255,.06);
      display: flex; flex-direction: column; gap: 8px;
      position: relative; overflow: hidden;
      transition: .2s;
    }
    .card:hover {
      border-color: rgba(255,215,0,.3);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,.35);
      background: var(--card-h);
    }

    /* done state */
    .card.done {
      opacity: .55;
      border-color: rgba(16,185,129,.25) !important;
    }
    .card.done .card-emoji::after {
      content: '✓';
      position: absolute; top: -4px; right: -4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--done-c);
      color: #fff; font-size: .7rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
    }

    /* epic style */
    .card.epic {
      background: linear-gradient(135deg, #0f0c1a, #130f22);
      border-color: rgba(168,85,247,.18) !important;
    }
    .card.epic:hover { border-color: rgba(168,85,247,.45) !important; }

    .card-emoji {
      font-size: 2.2rem; line-height: 1;
      position: relative; display: inline-block;
      width: fit-content;
    }

    .card-title {
      font-size: .95rem; font-weight: 700; line-height: 1.3;
    }

    .card-desc {
      font-size: .8rem; color: #64748b; line-height: 1.5; flex: 1;
    }

    .card-foot {
      display: flex; justify-content: space-between;
      align-items: center; margin-top: 6px;
    }

    .pts-pill {
      background: rgba(255,215,0,.08);
      border: 1px solid rgba(255,215,0,.25);
      color: var(--gold);
      font-size: .78rem; font-weight: 800;
      padding: 4px 11px; border-radius: 99px;
    }
    .card.epic .pts-pill {
      background: rgba(168,85,247,.1);
      border-color: rgba(168,85,247,.35);
      color: #c084fc;
    }

    .btn-do {
      padding: 6px 15px; border-radius: 99px;
      border: 1.5px solid var(--gold);
      background: transparent; color: var(--gold);
      font-size: .78rem; font-weight: 700;
      cursor: pointer; transition: .16s;
    }
    .btn-do:hover { background: var(--gold); color: #000; }

    .card.done .btn-do {
      border-color: rgba(16,185,129,.4);
      color: #10b981;
    }
    .card.done .btn-do:hover { background: rgba(16,185,129,.15); }

    .card.epic .btn-do { border-color: #c084fc; color: #c084fc; }
    .card.epic .btn-do:hover { background: var(--epic-c); color: #fff; }

    /* ── MILESTONE POPUP ────────────────────────────────── */
    #ms-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.92); z-index: 9999;
      align-items: center; justify-content: center;
    }

    .ms-box { text-align: center; padding: 40px 30px; max-width: 380px; }

    .ms-emo {
      font-size: 5rem; display: block;
      margin-bottom: 14px;
      animation: bounce .6s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    .ms-pts { font-size: 3rem; font-weight: 900; color: var(--gold); line-height: 1; }
    .ms-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .ms-sub { font-size: 1rem; color: #94a3b8; margin-bottom: 28px; }

    .btn-ms {
      background: var(--gold); color: #000;
      font-weight: 900; font-size: 1.05rem;
      border: none; padding: 14px 40px;
      border-radius: 99px; cursor: pointer;
      box-shadow: 0 0 30px rgba(255,215,0,.4);
      transition: .2s;
    }
    .btn-ms:hover { transform: scale(1.06); }

    /* ── CONFETTI ───────────────────────────────────────── */
    #cnv {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9998;
    }

    /* ── BOTTOM ─────────────────────────────────────────── */
    .bottom {
      text-align: center; padding: 20px;
    }
    .btn-reset {
      background: none;
      border: 1px solid rgba(255,255,255,.08);
      color: #475569; padding: 7px 20px;
      border-radius: 99px; cursor: pointer;
      font-size: .78rem; transition: .2s;
    }
    .btn-reset:hover { color: #94a3b8; border-color: rgba(255,255,255,.18); }

    @media (max-width: 480px) {
      .logo { font-size: 1.15rem; }
      .score-num { font-size: 1.9rem; }
      .grid { padding: 10px 10px 24px; gap: 10px; }
    }
  </style>
</head>

  { id:69, cat:'epic',    e:'🏅', t:'אתגר 30 יום',             d:'לבחור אתגר ולעשות אותו כל יום — 30 יום ברצף', pts:150000 },
  { id:70, cat:'epic',    e:'🏃‍♂️', t:'חצי מרתון — 21 ק"מ',   d:'לרוץ 21 קילומטר ברצף', pts:100000 },
  { id:71, cat:'epic',    e:'🎥', t:'סרטון יוטיוב מוגמר',      d:'לצלם, לערוך ולפרסם סרטון יוטיוב מקורי ומלוטש', pts:80000 },
  { id:72, cat:'epic',    e:'💻', t:'לבנות אתר/אפליקציה',      d:'ללמוד ולבנות אתר אינטרנט או אפליקציה פשוטה מאפס', pts:100000 },
  { id:73, cat:'epic',    e:'📵', t:'שבוע ללא מסכים',          d:'לעבור שבוע שלם ללא מסכים — חוץ משיעורים', pts:200000 },

const MILESTONES = [
  { pts:100000,  emo:'⭐', pts_lbl:'100,000',  name:'הגעתם ל-100K!',    sub:'התחלה מרשימה — המשיכו לרוץ!' },
  { pts:250000,  emo:'🌟', pts_lbl:'250,000',  name:'רבע מיליון!',      sub:'אתם בדרך הנכונה — יאללה!' },
  { pts:500000,  emo:'💫', pts_lbl:'500,000',  name:'חצי מיליון!',      sub:'אמצע הדרך — אל תעצרו!' },
  { pts:750000,  emo:'🔥', pts_lbl:'750,000',  name:'75% — כמעט שם!',   sub:'עוד רבע ומגיעים!' },
  { pts:1000000, emo:'🏆', pts_lbl:'1,000,000',name:'מיליון!!! 🎉',      sub:'עשיתם את זה! אלופים מוחלטים!' },
];

/* ── STATE ──────────────────────────────────────────────── */
const KEY_DONE = 'rm-done-v1';
const KEY_MS   = 'rm-ms-v1';

let done     = new Set(JSON.parse(localStorage.getItem(KEY_DONE) || '[]'));
let shownMs  = new Set(JSON.parse(localStorage.getItem(KEY_MS)  || '[]'));
let activeCat = 'all';
let animPts  = 0;   // current displayed value (for counter animation)

/* ── UTILS ──────────────────────────────────────────────── */
function fmt(n) { return n.toLocaleString('he-IL'); }
function getTotal() { return TASKS.filter(t => done.has(t.id)).reduce((s,t) => s + t.pts, 0); }
function save() {
  localStorage.setItem(KEY_DONE, JSON.stringify([...done]));
  localStorage.setItem(KEY_MS,   JSON.stringify([...shownMs]));
}

/* ── HEADER UPDATE ──────────────────────────────────────── */
let countAnim = null;
function updateHeader(prevPts) {
  const total = getTotal();
  const pct   = Math.min(100, total / 10000);    // 1M = 100%

  // animate counter
  if (countAnim) cancelAnimationFrame(countAnim);
  const from = prevPts ?? total;
  const start = performance.now();
  const dur = 700;
  (function step(now) {
    const p = Math.min(1, (now - start) / dur);
    const ease = 1 - Math.pow(1 - p, 3);
    animPts = Math.round(from + (total - from) * ease);
    document.getElementById('pts-num').textContent = fmt(animPts);
    if (p < 1) countAnim = requestAnimationFrame(step);
    else document.getElementById('pts-num').textContent = fmt(total);
  })(start);

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent  = pct.toFixed(1) + '%';
  const left = Math.max(0, 1000000 - total);
  document.getElementById('pts-left').textContent  =
    left === 0 ? '🎉 הגעתם למיליון!' : 'נותרו ' + fmt(left) + ' נ׳';

  const doneCount = done.size;
  document.getElementById('tasks-badge').innerHTML =
    `<b>${doneCount}</b> מתוך ${TASKS.length} משימות`;
}

/* ── CATEGORIES ─────────────────────────────────────────── */
function renderCats() {
  const row = document.getElementById('cat-row');
  row.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c.id === activeCat ? ' active' : '') + (c.epic ? ' is-epic' : '');
    const count  = c.id === 'all' ? TASKS.length : TASKS.filter(t => t.cat === c.id).length;
    const dcount = c.id === 'all' ? done.size    : TASKS.filter(t => t.cat === c.id && done.has(t.id)).length;
    btn.textContent = `${c.label} (${dcount}/${count})`;
    btn.onclick = () => { activeCat = c.id; renderCats(); renderGrid(); };
    row.appendChild(btn);
  });
}

/* ── GRID ────────────────────────────────────────────────── */
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const list = activeCat === 'all' ? TASKS : TASKS.filter(t => t.cat === activeCat);
  list.forEach(t => {
    const isDone = done.has(t.id);
    const isEpic = t.cat === 'epic';
    const card = document.createElement('div');
    card.className = 'card' + (isDone ? ' done' : '') + (isEpic ? ' epic' : '');
    card.innerHTML = `
      <div class="card-emoji">${t.e}</div>
      <div class="card-title">${t.t}</div>
      <div class="card-desc">${t.d}</div>
      <div class="card-foot">
        <div class="pts-pill">+${fmt(t.pts)} נ׳</div>
        <button class="btn-do" onclick="toggleTask(${t.id}, this)">
          ${isDone ? '✓ בוצע' : 'בצעתי! ✓'}
        </button>
      </div>`;
    grid.appendChild(card);
  });
}

/* ── TOGGLE TASK ─────────────────────────────────────────── */
function toggleTask(id, btn) {
  const prev = getTotal();
  if (done.has(id)) {
    done.delete(id);
  } else {
    done.add(id);
    const task = TASKS.find(t => t.id === id);
    flyPoints(task.pts, btn);
  }
  save();
  const next = getTotal();
  updateHeader(prev);
  checkMilestones(prev, next);
  renderCats();
  // update just this card visually
  const card = btn.closest('.card');
  const isDone = done.has(id);
  card.classList.toggle('done', isDone);
  btn.textContent = isDone ? '✓ בוצע' : 'בצעתי! ✓';
}

/* ── FLY POINTS ──────────────────────────────────────────── */
function flyPoints(pts, btn) {
  const rect = btn.getBoundingClientRect();
  const el = document.createElement('div');
  el.textContent = '+' + fmt(pts);
  Object.assign(el.style, {
    position: 'fixed',
    left: rect.left + rect.width / 2 + 'px',
    top:  rect.top + 'px',
    transform: 'translateX(-50%)',
    color: '#FFD700',
    fontWeight: '900',
    fontSize: '1.4rem',
    pointerEvents: 'none',
    zIndex: '9997',
    textShadow: '0 0 12px rgba(255,215,0,.6)',
  });
  document.body.appendChild(el);
  el.animate([
    { opacity: 1, transform: 'translateX(-50%) translateY(0)'    },
    { opacity: 0, transform: 'translateX(-50%) translateY(-70px)' },
  ], { duration: 900, easing: 'ease-out' }).onfinish = () => el.remove();
}

/* ── MILESTONES ──────────────────────────────────────────── */
function checkMilestones(prev, next) {
  for (const ms of MILESTONES) {
    if (!shownMs.has(ms.pts) && prev < ms.pts && next >= ms.pts) {
      shownMs.add(ms.pts);
      save();
      showMilestone(ms);
      launchConfetti();
      return;
    }
  }
}

function showMilestone(ms) {
  document.getElementById('ms-emo').textContent  = ms.emo;
  document.getElementById('ms-pts').textContent  = ms.pts_lbl;
  document.getElementById('ms-name').textContent = ms.name;
  document.getElementById('ms-sub').textContent  = ms.sub;
  document.getElementById('ms-overlay').style.display = 'flex';
}

function closeMilestone() {
  document.getElementById('ms-overlay').style.display = 'none';
  stopConfetti();
}

/* ── CONFETTI ────────────────────────────────────────────── */
const cnv = document.getElementById('cnv');
const cx  = cnv.getContext('2d');
let particles = [];
let confAnim  = null;
const COLORS  = ['#FFD700','#FF6B35','#4ECDC4','#FF2D55','#00C4FF','#ffffff','#c084fc'];

function launchConfetti() {
  cnv.width  = window.innerWidth;
  cnv.height = window.innerHeight;
  particles  = Array.from({ length: 180 }, () => ({
    x: Math.random() * cnv.width,
    y: Math.random() * -cnv.height * .6,
    w: Math.random() * 10 + 5,
    h: Math.random() * 5 + 3,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vy: Math.random() * 3 + 2,
    vx: (Math.random() - .5) * 2,
    rot: Math.random() * 360,
    rs: (Math.random() - .5) * 6,
  }));
  animConfetti();
}

function animConfetti() {
  cx.clearRect(0, 0, cnv.width, cnv.height);
  let alive = false;
  particles.forEach(p => {
    p.y   += p.vy;
    p.x   += p.vx;
    p.rot += p.rs;
    if (p.y < cnv.height + 20) alive = true;
    cx.save();
    cx.translate(p.x, p.y);
    cx.rotate(p.rot * Math.PI / 180);
    cx.fillStyle = p.color;
    cx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cx.restore();
  });
  if (alive) confAnim = requestAnimationFrame(animConfetti);
  else stopConfetti();
}

function stopConfetti() {
  if (confAnim) cancelAnimationFrame(confAnim);
  cx.clearRect(0, 0, cnv.width, cnv.height);
}

/* ── RESET ───────────────────────────────────────────────── */
function confirmReset() {
  if (confirm('לאפס את כל ההתקדמות? ✗')) {
    done.clear(); shownMs.clear();
    localStorage.removeItem(KEY_DONE);
    localStorage.removeItem(KEY_MS);
    updateHeader(0);
    renderCats();
    renderGrid();
  }
}

/* ── INIT ────────────────────────────────────────────────── */
renderCats();
renderGrid();
updateHeader();
</script>
